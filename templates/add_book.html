<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yeni Kitap Ekle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container"> <h2>📚 Yeni Kitap Ekle</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Kitap adı" required>
        <input type="text" name="author" placeholder="Yazar" required>
        <input type="number" step="0.01" name="price" placeholder="Fiyat" required>
        <input type="text" name="image" placeholder="Görsel URL (Örn: https://...)" required>
        <button type="submit" style="width: 100%; margin-top: 10px;">Kitabı Sisteme Ekle</button>
    </form>
    <br>
    <a href="/admin" style="text-decoration: none; color: #777;">⬅ Admin Paneline Dön</a>
</div>

</body>
</html>
